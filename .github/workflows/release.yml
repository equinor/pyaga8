name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  actions: write
    
jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Validate version match
      run: |
        CARGO_VERSION=$(python -c "import tomllib; print(tomllib.load(open('Cargo.toml', 'rb'))['package']['version'])")
        RELEASE_VERSION=${{ github.event.release.tag_name }}
        RELEASE_VERSION=${RELEASE_VERSION#v}
        
        echo "Cargo.toml version: $CARGO_VERSION"
        echo "GitHub release version: $RELEASE_VERSION"
        
        if [ "$CARGO_VERSION" != "$RELEASE_VERSION" ]; then
          echo "❌ ERROR: Version mismatch!"
          echo "Cargo.toml version ($CARGO_VERSION) does not match GitHub release tag ($RELEASE_VERSION)"
          exit 1
        fi
        echo "✓ Version check passed!"

  build-and-test:
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    - name: Install maturin
      run: pip install maturin
    - name: Build the package
      run: maturin build --release
    - name: Upload wheel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ matrix.os }}-${{ matrix.python-version }}
        path: target/wheels/*.whl

  upload-source:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: "3.9"
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    - name: Install maturin
      run: pip install maturin
    - name: Create source distribution
      run: maturin sdist
    - name: Upload source distribution
      uses: actions/upload-artifact@v4
      with:
        name: dist-source-ubuntu-latest-3.9
        path: target/wheels/*.tar.gz

  publish-to-pypi:
    runs-on: ubuntu-latest
    needs: [build-and-test, upload-source]
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: dist-*
        path: dist

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
      run: |
        pip install twine==6.0.1
        ls -R -l *
        twine upload dist/dist-*/*.whl dist/dist-*/*.tar.gz